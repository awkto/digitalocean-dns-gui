<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalOcean DNS Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="topbar">
        <div class="topbar-inner">
            <div class="topbar-brand">
                <svg class="brand-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                <span class="brand-name">DO DNS Manager</span>
            </div>
            <div class="topbar-actions">
                <button id="darkModeToggle" class="topbar-btn" title="Toggle dark mode" onclick="toggleDarkMode()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <button id="settingsBtn" class="topbar-btn" title="Settings" onclick="window.location.href='/settings.html'">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
                <div class="topbar-divider"></div>
                <button id="logoutBtn" class="topbar-btn" title="Logout">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="content-container">
            <!-- Zone Bar -->
            <div class="zone-bar">
                <div class="zone-bar-left">
                    <span class="zone-label">Zone</span>
                    <span class="zone-name-display" id="zoneName">Loading...</span>
                    <span class="zone-meta" id="recordCount">0 records</span>
                </div>
                <div class="zone-bar-right">
                    <button id="refreshBtn" class="action-btn action-btn-secondary">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Refresh
                    </button>
                    <button id="addRecordBtn" class="action-btn action-btn-primary">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Record
                    </button>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-wrapper">
                    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search records...">
                </div>
                <div class="filter-row">
                    <span class="filter-label">Type</span>
                    <button id="selectAllBtn" class="filter-toggle">All</button>
                    <button id="deselectAllBtn" class="filter-toggle">Clear</button>
                    <div class="type-filters" id="typeFilters"></div>
                    <span class="results-count" id="resultsCount">0 Records</span>
                </div>
            </div>

            <!-- Table -->
            <div class="table-card">
                <div id="loadingIndicator" class="status-message">Loading records...</div>
                <div id="errorMessage" class="status-error" style="display:none;"></div>
                <div class="table-wrapper">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th class="col-name">Name / FQDN</th>
                                <th class="col-type">Type</th>
                                <th class="col-ttl">TTL</th>
                                <th class="col-values">Values</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Record Modal -->
    <div id="addModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New DNS Record</h2>
                <button class="close" title="Close">&times;</button>
            </div>
            <form id="addRecordForm" class="modal-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="recordName">Record Name</label>
                        <input type="text" id="recordName" name="recordName" required placeholder="e.g., www or @ for root" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="recordType">Record Type</label>
                        <select id="recordType" name="recordType" required class="form-select">
                            <option value="A">A (IPv4 Address)</option>
                            <option value="AAAA">AAAA (IPv6 Address)</option>
                            <option value="CNAME">CNAME (Canonical Name)</option>
                            <option value="MX">MX (Mail Exchange)</option>
                            <option value="TXT">TXT (Text)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="recordTTL">TTL (seconds)</label>
                        <input type="number" id="recordTTL" name="recordTTL" value="3600" required class="form-input">
                    </div>
                    <div class="form-group form-group-full">
                        <label for="recordValues">Value(s)</label>
                        <textarea id="recordValues" name="recordValues" required class="form-textarea" placeholder="Enter one value per line&#10;For MX: priority exchange (e.g., 10 mail.example.com)"></textarea>
                        <small class="form-help">Enter one value per line. For multiple A records, add multiple IPs.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="action-btn action-btn-secondary" id="cancelAddBtn">Cancel</button>
                    <button type="submit" class="action-btn action-btn-primary">Add Record</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit DNS Record</h2>
                <button class="close" title="Close">&times;</button>
            </div>
            <form id="editRecordForm" class="modal-form">
                <input type="hidden" id="editRecordType">
                <input type="hidden" id="editRecordId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editRecordName">Record Name</label>
                        <input type="text" id="editRecordName" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Record Type</label>
                        <input type="text" id="editRecordTypeDisplay" disabled class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="editRecordTTL">TTL (seconds)</label>
                        <input type="number" id="editRecordTTL" name="editRecordTTL" required class="form-input">
                    </div>
                    <div class="form-group form-group-full">
                        <label for="editRecordValues">Value(s)</label>
                        <textarea id="editRecordValues" name="editRecordValues" required class="form-textarea"></textarea>
                        <small class="form-help">Enter one value per line.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="action-btn action-btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="action-btn action-btn-primary">Update Record</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
