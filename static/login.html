<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DO DNS Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .login-card { width: 100%; max-width: 400px; background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; }
        .login-header { padding: 2rem 2rem 1rem; text-align: center; }
        .login-header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.375rem; }
        .login-header p { font-size: 0.8125rem; color: var(--text-tertiary); }
        .login-icon { width: 40px; height: 40px; color: var(--accent); margin: 0 auto 1rem; }
        .login-body { padding: 1rem 2rem 2rem; }
        .login-error { padding: 0.75rem 1rem; border-radius: var(--radius-sm); margin-bottom: 1rem;
            background: var(--danger-subtle); border: 1px solid var(--danger); color: var(--danger-text);
            font-size: 0.875rem; display: none; }
        .login-body .form-group { margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.375rem; }
        .login-body .form-group label { font-size: 0.8125rem; font-weight: 500; color: var(--text-primary); }
        .login-submit { width: 100%; padding: 0.625rem; font-size: 0.875rem; font-weight: 500;
            font-family: var(--font-sans); background: var(--accent); color: white;
            border: 1px solid var(--accent); border-radius: var(--radius-sm); cursor: pointer;
            transition: background 0.15s; }
        .login-submit:hover { background: var(--accent-hover); }
        .setup-badge { display: inline-block; padding: 0.1875rem 0.625rem; border-radius: 999px;
            background: var(--accent-subtle); border: 1px solid var(--border-focus); color: var(--accent-text);
            font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <svg class="login-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                <h1>DO DNS Manager</h1>
                <p id="loginSubtitle">Loading...</p>
            </div>
            <div class="login-body">
                <div class="login-error" id="loginError"></div>
                <form id="setupForm" style="display: none;">
                    <span class="setup-badge">First-time setup</span>
                    <div class="form-group">
                        <label for="newPassword">Admin Password</label>
                        <input type="password" id="newPassword" class="form-input" required placeholder="At least 8 characters" autofocus minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-input" required placeholder="Repeat your password" minlength="8">
                    </div>
                    <button type="submit" class="login-submit" id="setupBtn">Create Password & Login</button>
                </form>
                <form id="loginForm" style="display: none;">
                    <div class="form-group">
                        <label for="passwordInput">Password</label>
                        <input type="password" id="passwordInput" class="form-input" required placeholder="Enter your password" autofocus>
                    </div>
                    <button type="submit" class="login-submit" id="loginBtn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        const subtitle = document.getElementById('loginSubtitle');
        const loginError = document.getElementById('loginError');
        const setupForm = document.getElementById('setupForm');
        const loginForm = document.getElementById('loginForm');

        function showError(msg) { loginError.textContent = msg; loginError.style.display = 'block'; }
        function hideError() { loginError.style.display = 'none'; }

        (async () => {
            try {
                const res = await fetch('/api/auth/setup-required');
                const data = await res.json();
                if (data.required) {
                    subtitle.textContent = 'Create an admin password to get started';
                    setupForm.style.display = 'block';
                } else {
                    subtitle.textContent = 'Enter your password to continue';
                    loginForm.style.display = 'block';
                }
            } catch { subtitle.textContent = 'Could not connect to server'; showError('Connection error.'); }
        })();

        setupForm.addEventListener('submit', async (e) => {
            e.preventDefault(); hideError();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) { showError('Passwords do not match'); return; }
            if (password.length < 8) { showError('Password must be at least 8 characters'); return; }
            const btn = document.getElementById('setupBtn');
            btn.disabled = true; btn.textContent = 'Setting up...';
            try {
                const res = await fetch('/api/auth/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
                if (res.ok) window.location.href = '/';
                else { const data = await res.json(); showError(data.error || 'Setup failed'); }
            } catch { showError('Connection error.'); }
            finally { btn.disabled = false; btn.textContent = 'Create Password & Login'; }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); hideError();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = 'Logging in...';
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: document.getElementById('passwordInput').value }) });
                if (res.ok) window.location.href = '/';
                else { const data = await res.json(); showError(data.error || 'Invalid password'); document.getElementById('passwordInput').select(); }
            } catch { showError('Connection error.'); }
            finally { btn.disabled = false; btn.textContent = 'Login'; }
        });
    </script>
</body>
</html>
